<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SharpBrain 2.0 API Docs</title>
    <style>
        body { font-family: monospace; background: #fafafa; color: #333; padding: 40px; line-height: 1.5; }
        .wrapper { max-width: 900px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; font-size: 20px; }
        .endpoint { background: #fff; border: 1px solid #ddd; padding: 20px; margin-bottom: 10px; }
        .method { font-weight: bold; color: #005cc5; margin-right: 10px; }
        .url { color: #d73a49; font-weight: bold; }
        .label { color: #6a737d; font-size: 12px; text-transform: uppercase; margin-top: 10px; display: block; }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        td { padding: 5px; border-bottom: 1px dashed #eee; font-size: 13px; }
        .crucial { color: red; }
        .optional { color: green; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>SHARPBRAIN 2.0 API SYSTEM</h1>

    <div id="api-content">
        </div>
</div>

<script>
    const BASE_URL = "https://sharpbrain2-0.onrender.com"; 

    const endpoints = [
        { 
            name: "Home", method: "GET", path: "/", 
            data: "None", constr: "None", resp: "Plain Text" , info : "Home directory"
        },

        { 
            name: "API Docs", method: "GET", path: "/api_doc/", 
            data: "None", constr: "None", resp: "This HTML" , info : "Api documentation"
        },
        {
            name: "Universities_name", method: "GET, POST", path: "/universities_name/",
            data: " GET: None | POST: body ", constr: "GET: None | POST : name_of_universities (OPTIONAL)", resp: "JSON {id, name_of_universities}", info: "Update/Get the name of uni in Db"
        },
        {
            name: "Universities_nameDelPut", method: "PUT,DELETE", path: "/universities_name/{index}",
            data: " DELETE: None | PUT: None ", constr: "DELETE: None | PUT : name_of_universities (CRUCIAL)", resp: "DELETE: JSON {'result' : 'id {index} have been deleted'} | PUT: JSON index, name_of_universities", info: "Delete/ Put the name of uni in Db"
        },
        {
            name: "CoursesOffered", method: "GET, POST", path: "/course_names/",
            data: "POST:BODY | GET: None", constr: "POST: | GET: none", resp: "", info: ""
        },
        {
            name: "Aichat", method: "POST", path: "/aichat/",
            data: "BODY", constr: "message, ai_name, history OPTIONAL", resp: "JSON {ai_response, token_count}", info: "Gemini AI"
        },
        { 
            name: "OTP", method: "POST", path: "/otp/",
            data: "Body", 
            constr: "email, surname,firstname (CRUCIAL)", 
            resp: "JSON {message, otp}" , info : "Send one time password(opt) to Email."
        },
        { 
            name: "UserCustomData", method: "POST", path: "/signup/", 
            data: "Body", 
            constr: "password (CRUCIAL), email, first_name, surname, dept_name (OPTIONAL)", 
            resp: "JSON {message, data}" , info : "Empty"
        },
        
    ];

    const container = document.getElementById('api-content');

    endpoints.forEach(ep => {
        container.innerHTML += `
            <div class="endpoint">
                <h3>INFORMATION: ${ep.info}</h3>
                <div><span class="method">${ep.method}</span> <a href= "${BASE_URL}${ep.path}" target = "_blank" class="url">${BASE_URL}${ep.path}</a></div>
                <span class="label">View Name</span> <strong>${ep.name}</strong>
                <span class="label">Data Collection Mode {Request} :   ${ep.data}</span>
                <span class="label">Data Construction</span> <em>${ep.constr}</em>
                <span class="label">View Response</span> ${ep.resp}
                
            </div>
        `;
    });
</script>
</body>
</html>
