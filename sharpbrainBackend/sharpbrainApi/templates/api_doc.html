<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SharpBrain 2.0 API Docs</title>
    <style>
        body { font-family: monospace; background: #fafafa; color: #333; padding: 40px; line-height: 1.5; }
        .wrapper { max-width: 900px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; font-size: 20px; }
        .endpoint { background: #fff; border: 1px solid #ddd; padding: 20px; margin-bottom: 10px; }
        .method { font-weight: bold; color: #005cc5; margin-right: 10px; }
        .url { color: #d73a49; font-weight: bold; }
        .label { color: #6a737d; font-size: 12px; text-transform: uppercase; margin-top: 10px; display: block; }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        td { padding: 5px; border-bottom: 1px dashed #eee; font-size: 13px; }
        .crucial { color: red; }
        .optional { color: green; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>SHARPBRAIN 2.0 API SYSTEM</h1>

    <div id="api-content">
        </div>
</div>

<script>
    // const BASE_URL = "https://sharpbrain2-0.onrender.com"; 
    const BASE_URL = "https://esta-sensate-unquickly.ngrok-free.dev";
    const endpoints = [
        { 
            name: "Home", method: "GET", path: "/", 
            data: "None", constr: "None", resp: "Plain Text" , info : "Home directory"
        },

        { 
            name: "API Docs", method: "GET", path: "/api_doc/", 
            data: "None", constr: "None", resp: "This HTML" , info : "Api documentation"
        },
        {
            name: "Universities_name", method: "GET, POST", path: "/universities_name/",
            data: " GET: None | POST: body ", constr: "GET: None | POST : {name_of_universities : ''} (OPTIONAL)", resp: "GET: A list of JSONs {id, name_of_universities} | POST: JSON {id, name_of_universities}", info: "Post/Get the name of uni in Db"
        },
        {
            name: "Universities_nameDelPut", method: "PUT,DELETE", path: "/universities_name/{index}/",
            data: " DELETE: None | PUT: None ", constr: "DELETE: None | PUT : {name_of_universities: str} (CRUCIAL)", resp: "DELETE: JSON {result : id {index} have been deleted} | PUT: JSON {index, name_of_universities}", info: "Delete/ Put the name of uni in Db"
        },
        {
            name: "CoursesOffered", method: "GET, POST", path: "/course_names/",
            data: "POST:BODY | GET: None", constr: "POST: {name_of_uni : '', courses_offered : []} CRUCIAL | GET: none", resp: "POST: JSON {id : int, name_of_uni : '', courses_offered : [] } | GET: A List of JSONs {id : int, name_of_uni : '', courses_offered : [] }", info: "UpdATE or Get available courses in a university"
        },
        {
            name: 'CoursesOfferedDelPut',method: "PUT,DELETE",path: '/course_names/{index}/',
            data: " DELETE: None | PUT: None " ,constr: "DELETE: None | PUT : {courses_offered: [], } (OPTIONAL) {name_of_uni: str} CRUCIAL",resp: "DELETE: JSON {result : id {index} have been deleted} | PUT: JSON {index: int, name_of_uni : '', courses_offered : []}",info: "Delete/ Put the name of the course in order"
        },
        {
            name: "JambAcceptedSubjects",method: "GET, POST",path: "/jamb_subject_combination/",
            data: "GET: None| POST: body",constr: "GET: None | POST: {uni_name: '', course_name: ''} CRUCIAL",resp: "GET: JSON {id : int, uni_name: '', course_name: '', subject_combination: [], core_subjects: []}| POST: same correct data you put in with index",info:"Cross verfying aspirant subjecr combination compatibility with jamb, i was affected by this during my own time."
        },
        {
            name: "jambAcceptedSubjectsPutDel",method: "DELETE | PUT",path: "/jamb_subject_combination{index}/",
            data: "DELETE: <i>still in progress<i>| PUT: None",constr: "DELETE: | PUT: {id : int, uni_name: '', course_name: '', subject_combination: [], core_subjects: []} OPTIONAL",resp: "DELETE: | PUT: same correct data you put in with index",info: "Delete/ Put the name of the jamb subject combination in order"
        },
        {
            name: "Aichat", method: "POST", path: "/aichat/",
            data: "BODY", constr: "{message: '', ai_name: '', history: {user: [], AI: []}} OPTIONAL", resp: "JSON {ai_response : '', token_count: int}", info: "Gemini AI"
        },
        { 
            name: "OTP", method: "POST", path: "/otp/",
            data: "Body", 
            constr: "email, surname,firstname (CRUCIAL)", 
            resp: "JSON {message, otp}" , info : "Send one time password(opt) to Email."
        },
        { 
            name: "UserCustomData", method: "POST", path: "/signup/", 
            data: "Body", 
            constr: "password (CRUCIAL), email, first_name, surname, dept_name (OPTIONAL)", 
            resp: "JSON {message, data}" , info : "Empty"
        },
        
    ];

    const container = document.getElementById('api-content');

    endpoints.forEach(ep => {
        container.innerHTML += `
            <div class="endpoint">
                <h3>INFORMATION: ${ep.info}</h3>
                <div><span class="method">${ep.method}</span> <a href= "${BASE_URL}${ep.path}" target = "_blank" class="url">${BASE_URL}${ep.path}</a></div>
                <span class="label">View Name</span> <strong>${ep.name}</strong>
                <span class="label">Data Collection Mode {Request} :   ${ep.data}</span>
                <span class="label">Data Construction</span> <em>${ep.constr}</em>
                <span class="label">View Response</span> ${ep.resp}
                
            </div>
        `;
    });
</script>
</body>
</html>
